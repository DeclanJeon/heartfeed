<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>HeartFeed · 연애 조언 AI</title>
<style>
  :root {
    --bg: #1a1620;
    --panel: #241f2e;
    --accent: #ff6b9d;
    --accent-2: #8b6fd6;
    --text: #ece8f1;
    --muted: #a89fb8;
    --card: #2e2839;
    --cite: #6fd6c4;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
    background: linear-gradient(160deg, #1a1620, #221b2e);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  header {
    width: 100%;
    padding: 18px 24px;
    text-align: center;
    background: rgba(36, 31, 46, 0.8);
    backdrop-filter: blur(8px);
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  header h1 { margin: 0; font-size: 22px; letter-spacing: -0.5px; }
  header h1 .pink { color: var(--accent); }
  header p { margin: 4px 0 0; font-size: 13px; color: var(--muted); }
  .wrap {
    width: 100%;
    max-width: 720px;
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 20px 16px 0;
  }
  #log {
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 14px;
    padding-bottom: 16px;
  }
  .msg { display: flex; gap: 10px; max-width: 100%; }
  .msg.user { flex-direction: row-reverse; }
  .bubble {
    padding: 12px 15px;
    border-radius: 16px;
    line-height: 1.6;
    font-size: 14.5px;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .msg.user .bubble {
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    color: #fff;
    border-bottom-right-radius: 4px;
  }
  .msg.bot .bubble {
    background: var(--card);
    border: 1px solid rgba(255,255,255,0.06);
    border-bottom-left-radius: 4px;
    width: 100%;
  }
  .empathy { font-size: 15px; font-weight: 600; margin-bottom: 8px; color: var(--accent); }
  .section-title { font-size: 12px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin: 12px 0 6px; }
  .action {
    background: rgba(139,111,214,0.12);
    border-left: 3px solid var(--accent-2);
    padding: 9px 12px;
    border-radius: 8px;
    margin-bottom: 7px;
    font-size: 14px;
  }
  .action .ex { color: var(--cite); font-size: 13px; margin-top: 4px; }
  .action .ev { color: var(--muted); font-size: 12.5px; margin-top: 3px; font-style: italic; }
  .cites { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
  .cite {
    font-size: 11.5px;
    color: var(--cite);
    background: rgba(111,214,196,0.08);
    border: 1px solid rgba(111,214,196,0.2);
    padding: 3px 8px;
    border-radius: 6px;
    text-decoration: none;
  }
  .cite:hover { background: rgba(111,214,196,0.16); }
  .typing { color: var(--muted); font-style: italic; font-size: 14px; }
  .inputbar {
    position: sticky;
    bottom: 0;
    background: var(--bg);
    padding: 14px 0 18px;
    display: flex;
    gap: 10px;
  }
  #q {
    flex: 1;
    background: var(--panel);
    border: 1px solid rgba(255,255,255,0.1);
    color: var(--text);
    border-radius: 12px;
    padding: 13px 16px;
    font-size: 15px;
    outline: none;
    resize: none;
    font-family: inherit;
  }
  #q:focus { border-color: var(--accent); }
  #send {
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    border: none;
    color: #fff;
    font-weight: 600;
    padding: 0 22px;
    border-radius: 12px;
    cursor: pointer;
    font-size: 15px;
  }
  #send:disabled { opacity: 0.5; cursor: default; }
  .samples { display: flex; flex-wrap: wrap; gap: 8px; padding: 6px 0 14px; }
  .sample {
    font-size: 12.5px;
    color: var(--muted);
    background: var(--panel);
    border: 1px solid rgba(255,255,255,0.08);
    padding: 6px 11px;
    border-radius: 20px;
    cursor: pointer;
  }
  .sample:hover { color: var(--text); border-color: var(--accent); }
</style>
</head>
<body>
<header>
  <h1>💗 <span class="pink">HeartFeed</span> 연애 조언 AI</h1>
  <p>증거 기반 한국어 연애·관계 상담 · 출처가 있는 답변</p>
</header>
<div class="wrap">
  <div class="samples" id="samples"></div>
  <div id="log"></div>
  <div class="inputbar">
    <textarea id="q" rows="1" placeholder="연애 고민을 적어보세요… (예: 연인과 자주 싸워요)"></textarea>
    <button id="send">전송</button>
  </div>
</div>

<script>
const SAMPLES = [
  "연인과 자주 싸워요. 대화법을 알려주세요.",
  "장거리 연애가 너무 힘들어요. 어떻게 버티면 좋을까요?",
  "고백하고 싶은데 용기가 안 나요.",
  "연인의 연락이 갑자기 뜸해졌어요. 무엇이 문제일까요?",
];

const log = document.getElementById("log");
const q = document.getElementById("q");
const send = document.getElementById("send");
const samplesBox = document.getElementById("samples");

SAMPLES.forEach(s => {
  const el = document.createElement("div");
  el.className = "sample";
  el.textContent = s;
  el.onclick = () => { q.value = s; q.focus(); };
  samplesBox.appendChild(el);
});

q.addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); ask(); }
});
send.onclick = ask;

let rid = 0;
const convId = "web-" + Date.now();
let history = [];
function addMsg(role, html) {
  const m = document.createElement("div");
  m.className = "msg " + role;
  const b = document.createElement("div");
  b.className = "bubble";
  b.innerHTML = html;
  m.appendChild(b);
  log.appendChild(m);
  log.scrollTop = log.scrollHeight;
  return m;
}

async function ask() {
  const text = q.value.trim();
  if (!text) return;
  addMsg("user", escapeHtml(text));
  q.value = "";
  send.disabled = true;
  const typ = addMsg("bot", '<span class="typing">답변을 생성하는 중…</span>');

  try {
    const resp = await fetch("/v2/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        schema_version: "2",
        request_id: "web-" + (++rid),
        conversation_id: convId,
        question: text,
        conversation_history: history.slice(-6),
        consent: {
          process_my_birth_data: false,
          store_my_data: false,
          process_partner_birth_data: false,
        },
      }),
    });
    const ct = resp.headers.get("content-type") || "";
    if (!resp.ok || !ct.includes("application/json")) {
      const body = await resp.text().catch(() => "");
      typ.remove();
      addMsg("bot", '<div class="bubble">⚠️ 서버 응답을 처리하지 못했어요 (HTTP ' + resp.status + '). 잠시 후 다시 시도해주세요.</div>');
      return;
    }
    const data = await resp.json();
    typ.remove();
    if (data.status === "needs_clarification") {
      const qs = (data.questions || []).map(q => q.prompt).join("<br>");
      const html = qs
        ? '<div class="bubble">💬 조금만 알려주시면 더 정확해요:<br>' + qs + '<br><br><i>"그냥 답변해 주세요"라고 입력하시면 바로 이어갑니다.</i></div>'
        : '<div class="bubble">이전 맥락을 이어서 답변드릴게요.</div>';
      addMsg("bot", html);
      return;
    }
    if (data.status && data.status !== "answered") {
      addMsg("bot", '<div class="bubble">⚠️ ' + escapeHtml(JSON.stringify(data)) + "</div>");
      return;
    }
    renderAnswer(data);
    history.push({ role: "user", content: text });
    const ans = data.answer || {};
    const summary = ans.summary || ans.empathy || "";
    history.push({ role: "assistant", content: summary });
  } finally {
    send.disabled = false;
  }
}

function renderAnswer(d) {
  const a = d.answer || {};
  let html = "";
  if (a.empathy) html += '<div class="empathy">' + escapeHtml(a.empathy) + "</div>";
  if (a.situation_framing) html += "<div>" + escapeHtml(a.situation_framing) + "</div>";
  if (Array.isArray(a.actions) && a.actions.length) {
    html += '<div class="section-title">실천 제안</div>';
    a.actions.forEach(ac => {
      html += '<div class="action">';
      html += escapeHtml(ac.text || "");
      if (ac.example) html += '<div class="ex">💬 예시: ' + escapeHtml(ac.example) + "</div>";
      if (ac.evidence_quote) html += '<div class="ev">📌 증거: ' + escapeHtml(ac.evidence_quote) + "</div>";
      html += "</div>";
    });
  }
  if (a.summary) html += '<div class="section-title">요약</div><div>' + escapeHtml(a.summary) + "</div>";

  const cites = d.citations || [];
  if (cites.length) {
    html += '<div class="cites">';
    cites.forEach(c => {
      const label = c.title || c.source_id || "출처";
      const url = c.timestamp_url || "";
      if (url) html += '<a class="cite" href="' + escapeAttr(url) + '" target="_blank" rel="noopener">🔗 ' + escapeHtml(label) + "</a>";
      else html += '<span class="cite">🔗 ' + escapeHtml(label) + "</span>";
    });
    html += "</div>";
  }
  addMsg("bot", html);
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));
}
function escapeAttr(s) { return escapeHtml(s); }
</script>
</body>
</html>
