    analogy: 관계도 한 번의 극적인 행동보다 서로 합의한 속도로 꾸준히 대화하고 약속을 지키는 과정이 중요할 수 있습니다.
    topics: [long-distance, relationships, conversation]
    caution: 상대를 경주 상대처럼 평가하거나 한쪽의 노력만 요구하는 비유로 사용하지 않습니다.
